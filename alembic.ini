# Alembic config. Migrations live in db/migrations/ (per ARCHITECTURE-SPINE.md tree);
# the SQLAlchemy models live in backend/app/models.py (Python owns data access, AD-8).
# Run from the repo root:  alembic upgrade head   (needs DATABASE_URL in the env)
[alembic]
script_location = db/migrations
prepend_sys_path = backend
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
